output_root: outputs

data:
  data_root: ..
  scene: Scene1
  modalities: [wifi, rfid, mmwave]
  train_subjects: [1, 2, 3, 4, 5, 6, 7]
  val_subjects: [8, 9]
  test_subjects: [10, 11]
  action_ids: null
  trials: null
  strict_missing: true

  normalization:
    enabled: true
    shared_cache: true
    cache_name: normalization_stats.json
    cache_root: outputs_cache/normalization
    samplewise_by_modality:
      wifi: channel
      rfid: channel
      mmwave: false
    samplewise_eps: 1.0e-6

  augment:
    wifi:
      enabled: true
      noise_std: 0.02
      scale_range: [0.95, 1.05]
      time_shift: 20
      time_shift_prob: 0.4
      time_mask_prob: 0.35
      time_mask_ratio: 0.05
      channel_dropout_prob: 0.15
      channel_dropout_ratio: 0.03
    rfid:
      enabled: true
      noise_std: 0.025
      scale_range: [0.95, 1.05]
      time_shift: 3
      time_shift_prob: 0.4
      time_mask_prob: 0.30
      time_mask_ratio: 0.06
      channel_dropout_prob: 0.10
      channel_dropout_ratio: 0.05
    mmwave:
      enabled: false

experiment:
  exp_name: agma_pure_anchor_softfix
  model_type: agma
  modalities: [wifi, rfid, mmwave]

model:
  num_classes: 55
  D: 256
  J: 8
  dropout: 0.25

  token_budgets:
    wifi: 12
    rfid: 4
    mmwave: 16
  time_bins_by_modality:
    wifi: 8
    rfid: 4
    mmwave: 4

  wifi:
    width: 64
  rfid:
    width: 48
  mmwave:
    width: 32
  norm_groups: 8

  dynamic_anchors: true
  anchor_offset_scale: 0.035
  anchor_temperature: 0.22
  agreement_gate_weight: 0.5
  # Reliability-aware gate bias: prior is injected into the gate logits, not only
  # used as a weak balance regularizer. This prevents noisy weak modalities from
  # pulling the consensus away from the strongest stream.
  modality_prior_logit_weight: 0.35
  reference_modality: mmwave
  reference_agreement_weight: 0.35
  reference_residual_weight: 0.20
  context_prior_weight: 0.50
  positive_anchor_mining:
    enabled: true
    reference_modality: mmwave
    threshold: 0.15
    temperature: 0.10
    min_weight: 0.05
    detach_reference: true
    positive_gate_weight: 0.50
    positive_alignment_weight: 1.00
    positive_aux_weight: 0.50
  anchor_layers: 1
  anchor_heads: 4

  anchor_diversity_weight: 0.0005
  dynamic_anchor_diversity_weight: 0.5
  anchor_repulsion_weight: 0.002
  alignment_weight: 0.02
  alignment_margin: 0.20
  alignment_warmup_ratio: 0.05
  # Cross-modal semantic-slot contrast keeps the same anchor index close across
  # modalities for the same instance/class, making "semantic alignment" explicit
  # instead of relying only on a weighted consensus center.
  contrastive_alignment_weight: 0.012
  contrastive_temperature: 0.12
  contrast_same_class_positives: false
  assignment_consistency_weight: 0.004
  assignment_balance_weight: 0.01
  assignment_entropy_weight: 0.0015
  gate_entropy_weight: 0.0
  # Reliability-aware anti-collapse prior. mmWave stays dominant, but WiFi/RFID
  # cannot be silently ignored by the gate during joint fusion.
  gate_balance_weight: 0.006
  gate_floor: 0.02
  modality_prior:
    wifi: 0.20
    rfid: 0.20
    mmwave: 0.60

  # Training-only auxiliary heads on each modality's anchor representation.
  # They protect strong modality discriminability, especially mmWave, while
  # inference still uses only the fused AGMA classifier.
  anchor_auxiliary:
    enabled: true
    layers: 0
    heads: 4
    weights:
      wifi: 0.03
      rfid: 0.03
      mmwave: 0.10

train:
  seed: 42
  device: cuda
  epochs: 100
  batch_size: 8
  num_workers: 6
  prefetch_factor: 2
  pin_memory: true
  persistent_workers: true
  lr: 0.0002
  weight_decay: 0.0001
  label_smoothing: 0.08
  early_stop_patience: 20
  early_stop_min_delta: 0.0
  amp: true
  grad_clip_norm: 5.0
  deterministic: false
  tf32: true
  modality_dropout:
    enabled: true
    full_batch_prob: 0.60
    p: 0.20
    min_keep: 2
    drop_probs:
      wifi: 0.15
      rfid: 0.15
      mmwave: 0.20

eval:
  missing_modalities: true
